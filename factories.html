<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabrika Yönetimi - Enerji Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">

    <aside class="sidebar">
        <div class="logo">EnerjiPanel</div>
        <ul class="nav-links">
            <li><a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> Genel Bakış</a></li>
            <li><a href="factories.html" class="active"><i class="fas fa-industry"></i> Fabrikalar</a></li>
            <li><a href="customer-management.html"><i class="fas fa-users"></i> Müşteriler</a></li>
            <li><a href="system-logs.html"><i class="fas fa-terminal"></i> Loglar</a></li>
        </ul>
        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</button>
    </aside>

    <main class="main-content" style="display: flex; gap: 20px; padding: 30px;">
        <!-- Sol: Fabrika Listesi -->
        <section style="flex: 1; max-width: 400px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3>Fabrikalar</h3>
                <button id="openFactoryModalBtn" style="width: auto; padding: 5px 15px;">+ Ekle</button>
            </div>
            <div id="factoryList" style="display: flex; flex-direction: column; gap: 10px;"></div>
        </section>

        <!-- Sağ: Detay Paneli (Seçili Fabrika) -->
        <section id="detailPanel" style="flex: 2; background: var(--surface-color); padding: 25px; border-radius: 8px; border: 1px solid #333;">
            <h2 id="detailTitle">Bir fabrika seçin</h2>
            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
            <div id="meterDisplay">
                <p style="color: var(--text-secondary);">Detayları görüntülemek için sol taraftan bir fabrika seçiniz.</p>
            </div>
        </section>
    </main>

    <!-- Modal aynı -->
    <div id="addFactoryModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="closeModalBtn">&times;</span>
            <h3>Yeni Fabrika Tanımla</h3>
            <form id="newFactoryForm">
                <div class="input-group"><label>Fabrika Adı</label><input type="text" id="newFacName" required></div>
                <div class="input-group"><label>Modem IP</label><input type="text" id="newFacIp" required></div>
                <div class="input-group"><label>Sayaç Adedi</label><input type="number" id="newFacCount" required></div>
                <button type="submit">Kaydet</button>
            </form>
        </div>
    </div>
    <script src="factories.js"></script>
</body>
</html>
