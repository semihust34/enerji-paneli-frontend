<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabrikalar ve Sayaçlar - Enerji İzleme</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">

    <!-- Sol Menü -->
    <aside class="sidebar">
        <div class="logo">EnerjiPanel</div>
        <ul class="nav-links">
            <li><a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> Genel Bakış</a></li>
            <li><a href="factories.html" class="active"><i class="fas fa-industry"></i> Fabrikalar & Sayaçlar</a></li>
            <li><a href="customer-management.html"><i class="fas fa-users"></i> Müşteri Yönetimi</a></li>
            <li><a href="system-logs.html"><i class="fas fa-terminal"></i> Sistem Logları</a></li>
        </ul>
        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</button>
    </aside>

    <main class="main-content">
        <header>
            <h2>Tesis ve Cihaz Yönetimi</h2>
            <div class="user-info">Hoş geldin, <span id="adminName">Yetkili</span></div>
        </header>

        <!-- Filtreleme ve Arama Çubuğu -->
        <section style="background-color: var(--surface-color); padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; display: flex; gap: 15px; align-items: center;">
            <div class="input-group" style="margin-bottom: 0; flex: 1;">
                <input type="text" id="searchInput" placeholder="Fabrika Adı, IP Adresi veya Sayaç ID ara..." style="width: 100%; border-color: #444;">
            </div>
            <button style="width: auto; padding: 12px 25px;"><i class="fas fa-search"></i> Cihaz Bul</button>
        </section>

        <!-- TABLO BAŞLIĞI VE BUTON -->
        <div class="table-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3>Tesis Listesi</h3>
            <button id="openFactoryModalBtn" style="width: auto; padding: 10px 20px;">+ Yeni Fabrika Ekle</button>
        </div>

        <!-- Detaylı Sayaç Tablosu -->
        <section class="data-table-section">
            <div class="table-container">
                <table id="metersTable">
                    <thead>
                        <tr>
                            <th>Tesis Adı</th>
                            <th>Sayaç ID (Seri No)</th>
                            <th>Modem IP</th>
                            <th>Sinyal (4G)</th>
                            <th>Son Okuma</th>
                            <th>Durum</th>
                            <th>İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="metersTableBody">
                        <!-- JavaScript ile veriler buraya dolacak -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- YENİ FABRİKA EKLEME MODALI -->
    <div id="addFactoryModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="closeModalBtn">&times;</span>
            <h3 style="margin-bottom: 20px;">Yeni Fabrika Tanımla</h3>
            <form id="newFactoryForm">
                <div class="input-group">
                    <label>Fabrika/Firma Adı</label>
                    <input type="text" id="newFacName" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Modem IP Adresi</label>
                    <input type="text" id="newFacIp" placeholder="Örn: 195.175.x.x" required>
                </div>
                <div class="input-group">
                    <label>Pano Sayaç Adedi</label>
                    <input type="number" id="newFacCount" required>
                </div>
                <button type="submit">Sisteme Kaydet</button>
            </form>
        </div>
    </div>
    
    <script src="factories.js"></script>
</body>
</html>
