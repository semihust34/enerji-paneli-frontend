<!DOCTYPE html>
<html lang="tr">
<head>
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme') || 'dark';
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {}
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müşteri Paneli - Enerji İzleme</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">

    <div class="mobile-topbar">
        <button id="sidebarToggleBtn" class="hamburger-btn" aria-label="Menüyü aç/kapat"><i class="fas fa-bars"></i></button>
        <span class="logo">EnerjiPanel</span>
    </div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- Sol Menü (Müşteriye Özel Sadeleştirilmiş) -->
    <aside class="sidebar">
        <div class="logo">EnerjiPanel</div>
        <ul class="nav-links">
            <li><a href="#" class="active"><i class="fas fa-chart-line"></i> Genel Bakış</a></li>
            <li><a href="customer-factories.html"><i class="fas fa-industry"></i> Tesislerim & Sayaçlar</a></li>
            <!-- Müşteri Yönetimi ve Sistem Logları buradan tamamen silindi -->
        </ul>

        <button type="button" class="theme-toggle-btn" data-theme-toggle><i class="fas fa-moon"></i> <span class="theme-toggle-label">Karanlık Mod</span></button>
        <!-- ÇIKIŞ YAP BUTONU -->
        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</button>
    </aside>

    <!-- Ana İçerik Alanı -->
    <main class="main-content">
        <header>
            <h2>Müşteri İzleme Ekranı</h2>
            <div class="user-info">
                Hoş geldin, <span id="customerName">Sayın Müşterimiz</span>
            </div>
        </header>

        <section class="content-cards">
            <div class="card">
                <h3>Bana Ait Tesisler</h3>
                <p class="big-number" id="statMyFacilities">—</p>
            </div>
            <div class="card">
                <h3>Güncel Reaktif Oran</h3>
                <p class="big-number" id="statReactive">—</p>
                <p style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 8px;">Modem verisi bağlandığında görüntülenecek</p>
            </div>
        </section>

        <section class="data-table-section">
            <div class="table-header" style="margin-bottom: 15px;">
                <h3>Aktif Tesislerim ve Sayaç Durumları</h3>
            </div>
            
            <div class="table-container">
                <table id="customerTable">
                    <thead>
                        <tr>
                            <th>Tesis Adı</th>
                            <th>Bağlı Sayaç</th>
                            <th>Son Veri Güncelleme</th>
                            <th>Durum</th>
                        </tr>
                    </thead>
                    <tbody id="customerTableBody">
                        <!-- Müşteriye ait veriler buraya gelecek -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="auth.js"></script>
    <script src="ui.js"></script>
    <script src="customer.js"></script>
</body>
</html>
