<!DOCTYPE html>
<html lang="tr">
<head>
    <script>
        // Kayıtlı tema tercihini sayfa çizilmeden önce uygula (ani renk çakması olmasın)
        (function () {
            try {
                var t = localStorage.getItem('theme') || 'dark';
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {}
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enerji Takip - Giriş</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">

        <button type="button" class="theme-toggle-standalone" data-theme-toggle title="Görünümü değiştir">
            <i class="fas fa-moon"></i> <span class="theme-toggle-label">Karanlık Mod</span>
        </button>

        <!-- LOGO ARTIK KUTUNUN DIŞINDA VE ÜSTÜNDE -->
        <div class="logo-container">
            <img src="logo.png" alt="BUL Mühendislik Logo" class="login-logo">
        </div>

        <!-- login-box artık logonun altında başlıyor -->
        <div class="login-box">
            <h2>Sisteme Giriş</h2>
            <p class="subtitle">Enerji İzleme Paneli</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Kullanıcı Adı</label>
                    <input type="text" id="username" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" required>
                </div>

                <div id="errorMessage" class="error-text hidden">Hatalı giriş yaptınız.</div>
                
                <button type="submit" id="loginBtn">Giriş Yap</button>
            </form>
        </div>
    </div>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
